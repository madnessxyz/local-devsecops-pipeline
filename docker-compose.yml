version: "3.8"

services:
  mongodb:
    container_name: mongo
    image: mongo:latest
    volumes:
      - data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app_network

  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile_optimized
    environment:
      - MONGODB_URI=mongodb://mongo:27017/wanderlust
      - CORS_ORIGIN=http://192.168.1.173:5173
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - app_network

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile_optimized
      args:
        - VITE_API_PATH=http://192.168.1.173:5000/api
    environment:
      - VITE_API_PATH=http://192.168.1.173:5000/api
    ports:
      - "5173:80"  # Exposes internal Nginx port 80 to external host port 5173
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  data:
    driver: local
